  <defs>
    <!-- Glowing trail gradient -->
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#7c6af7" stop-opacity="0.15"/>
      <stop offset="80%"  stop-color="#00ff9d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/>
    </linearGradient>

    <!-- Head glow filter -->
    <filter id="headGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Snake body segment shape -->
    <rect id="seg" width="10" height="10" rx="3" ry="3"/>

    <!-- Full snake path as a clipPath reference row -->
    <!-- We animate a group of segments along a sine-wave-ish path -->
  </defs>

