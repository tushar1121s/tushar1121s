    <!-- Tail end (dimmer, thinner) -->
    <rect x="-148" y="25" width="7" height="7" rx="2" fill="#00ff9d" opacity="0.12"/>
    <rect x="-136" y="25" width="7" height="7" rx="2" fill="#00ff9d" opacity="0.18"/>
    <rect x="-124" y="25" width="7" height="7" rx="2" fill="#00ff9d" opacity="0.24"/>
    <rect x="-112" y="25" width="8" height="8" rx="2" fill="#00ff9d" opacity="0.30"/>

    <!-- Body starts oscillating -->
    <rect x="-100" y="24" width="8" height="8" rx="2.5" fill="#00ff9d" opacity="0.38"/>
    <rect x="-88"  y="22" width="8" height="8" rx="2.5" fill="#00ff9d" opacity="0.46"/>
    <rect x="-76"  y="20" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.54"/>
    <rect x="-64"  y="22" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.60"/>
    <rect x="-52"  y="25" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.66"/>
    <rect x="-40"  y="28" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.70"/>
    <rect x="-28"  y="30" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.74"/>
    <rect x="-16"  y="28" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.78"/>
    <rect x="-4"   y="25" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.82"/>

    <!-- Mid-body brighter -->
    <rect x="8"    y="22" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.86"/>
    <rect x="20"   y="20" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.88"/>
    <rect x="32"   y="22" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.90"/>
    <rect x="44"   y="25" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.92"/>
    <rect x="56"   y="28" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.93"/>
    <rect x="68"   y="30" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.94"/>
    <rect x="80"   y="28" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.95"/>
    <rect x="92"   y="25" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.96"/>
    <rect x="104"  y="22" width="9" height="9" rx="3"   fill="#00ff9d" opacity="0.97"/>
    <rect x="116"  y="20" width="9" height="9" rx="3"   fill="#7c6af7" opacity="0.97"/>
    <rect x="128"  y="22" width="9" height="9" rx="3"   fill="#7c6af7" opacity="0.98"/>
    <rect x="140"  y="25" width="9" height="9" rx="3"   fill="#7c6af7" opacity="0.99"/>

    <!-- Neck — transitioning to head color -->
    <rect x="152"  y="24" width="10" height="10" rx="3" fill="#7c6af7"/>

    <!-- Head — with glow filter -->
    <g filter="url(#headGlow)">
      <rect x="162" y="22" width="12" height="12" rx="4" fill="#ffffff"/>
      <!-- Eyes -->
      <circle cx="167" cy="26" r="1.5" fill="#0a0a0f"/>
      <circle cx="171" cy="26" r="1.5" fill="#0a0a0f"/>
      <!-- Tongue -->
      <line x1="174" y1="28" x2="178" y2="26" stroke="#ff6b6b" stroke-width="1" stroke-linecap="round"/>
      <line x1="174" y1="28" x2="178" y2="30" stroke="#ff6b6b" stroke-width="1" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Soft glow sweep that follows the snake head -->
  <rect width="900" height="60" fill="url(#trailGrad)" opacity="0.4">
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-900 0"
      to="900 0"
      dur="12s"
      repeatCount="indefinite"
      calcMode="linear"
    />
